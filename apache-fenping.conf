<VirtualHost *:80>
  DocumentRoot /var/www/public
  DirectoryIndex index.html

  <Directory /var/www/public>
    Options -Indexes -ExecCGI +FollowSymLinks
    AllowOverride None
    Require all granted

    RewriteEngine On
    RewriteRule ^api(?:/(.*))?$ api.php [QSA,L]
    RewriteRule ^api\.php/.+$ api.php [QSA,L]
    RewriteRule (^|/)\. - [F,L]
    RewriteRule ^(?:backups|nmap|netboot|state)(?:/|$) - [F,L,NC]
    RewriteRule ^(?!api\.php$).+\.(?:php|sql|env|ini|log|bak|tgz|tar|gz)$ - [F,L,NC]

    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    RewriteRule ^ index.html [L]
  </Directory>

  <Directory /opt/fenping>
    AllowOverride None
    Require all denied
  </Directory>

  <Directory /var/lib/fenping>
    AllowOverride None
    Require all denied
  </Directory>

  ErrorLog ${APACHE_LOG_DIR}/error.log
  CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
