include /etc/nginx/modules/*.conf;

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  sendfile on;
  tcp_nopush on;
  client_max_body_size 512m;
  client_body_temp_path /tmp/nginx/client-body 1 2;
  fastcgi_temp_path /tmp/nginx/fastcgi 1 2;
  access_log off;

  server {
    listen 80 default_server;
    server_name _;
    root /var/www/public;
    index index.html;

    location = /api/events {
      limit_except GET { deny all; }
      nchan_subscriber eventsource;
      nchan_channel_id fenping-live;
      nchan_subscriber_first_message newest;
      nchan_eventsource_ping_interval 20;
      nchan_eventsource_ping_comment keepalive;
      nchan_max_channel_subscribers 128;
      add_header Cache-Control "no-cache, no-store";
    }

    location = /internal/live-updates {
      allow 127.0.0.1;
      deny all;
      nchan_publisher http;
      nchan_channel_id fenping-live;
      nchan_message_buffer_length 32;
      nchan_message_timeout 5m;
    }

    location ~ ^/(?:api(?:/|$)|api\.php(?:/|$)) {
      include /etc/nginx/fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /var/www/public/api.php;
      fastcgi_param SCRIPT_NAME /api.php;
      fastcgi_param HTTP_AUTHORIZATION $http_authorization;
      fastcgi_pass unix:/run/fenping/php-fpm.sock;
    }

    location ~ (^|/)\. {
      return 403;
    }

    location ~* ^/(?:backups|netboot|state)(?:/|$) {
      return 403;
    }

    location ~* \.(?:php[0-9]*|phtml|phar|sql|env|ini|log|bak|tgz|tar|gz)(?:\.|$) {
      return 403;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
