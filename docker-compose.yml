name: fenping

services:
  db:
    image: mariadb:11.8
    container_name: fenping-db
    restart: unless-stopped
    network_mode: none
    command: ["--skip-networking"]
    environment:
      MARIADB_DATABASE: ${DB_NAME:-ping}
      MARIADB_ROOT_PASSWORD: ${DB_PASS:-root}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - ./data/db:/var/lib/mysql
      - ./mariadb-fenping.cnf:/etc/mysql/conf.d/60-fenping.cnf:ro
      - db-socket:/run/mysqld
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=192m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MARIADB_ROOT_PASSWORD}\" mariadb --protocol=SOCKET --socket=/run/mysqld/mysqld.sock --user=root --batch --skip-column-names --execute='SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: 5m
        max-file: "2"

  app:
    image: ${FENPING_IMAGE:-fensoft/fenping}:${FENPING_VERSION:-1.6}
    container_name: fenping
    hostname: fenping
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: localhost
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_NAME: ${DB_NAME:-ping}
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_BROADCAST
      - NET_RAW
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
      - /run:rw,nosuid,nodev,size=64m,mode=0755
    volumes:
      - ./data/dnsmasq:/var/lib/misc
      - ./data/dnsmasq.d:/etc/dnsmasq.d
      - ./data/netboot:/var/lib/fenping/netboot
      - ./data/backups:/var/lib/fenping/backups
      - ./data/state:/var/lib/fenping/state
      - db-socket:/run/mysqld:ro
    logging:
      driver: local
      options:
        max-size: 5m
        max-file: "2"

volumes:
  db-socket:
