name: fenping

services:
  app:
    image: ${FENPING_IMAGE:-fensoft/fenping}:${FENPING_VERSION:-1.7}
    container_name: fenping
    hostname: fenping
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DOCKER_SOCKET: /run/docker.sock
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_BROADCAST
      - NET_RAW
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=1777
      - /run:rw,nosuid,nodev,size=64m,mode=0755
    volumes:
      - ./data/database:/var/lib/fenping/database
      - ./data/dnsmasq:/var/lib/misc
      - ./data/dnsmasq.d:/etc/dnsmasq.d
      - ./data/netboot:/var/lib/fenping/netboot
      - ./data/backups:/var/lib/fenping/backups
      - ./data/state:/var/lib/fenping/state
      - type: bind
        source: ${FENPING_DOCKER_SOCKET_SOURCE:-/dev/null}
        target: /run/docker.sock
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: 5m
        max-file: "2"
